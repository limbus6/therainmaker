<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="420" viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="rainmakerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#ff5ca8"/>
<stop offset="100%" stop-color="#7a2bff"/>
</linearGradient>

<style>

