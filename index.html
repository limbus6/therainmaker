<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Trashers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .menu-bar {
            position: absolute;
            top: 20px;
            left: 30px;
            display: flex;
            gap: 16px;
            background: rgba(0, 0, 0, 0.25);
            padding: 10px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(6px);
        }

        .menu-item {
            position: relative;
            list-style: none;
        }

        .menu-button {
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 10px;
        }

        .menu-button::after {
            content: "▾";
            margin-left: 6px;
            font-size: 0.8rem;
        }

        .dropdown {
            position: absolute;
            top: 38px;
            left: 0;
            min-width: 180px;
            background: rgba(20, 20, 30, 0.95);
            border-radius: 10px;
            padding: 8px 0;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(6px);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }

        .dropdown a {
            display: block;
            padding: 8px 16px;
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .dropdown a:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .menu-item:focus-within .dropdown,
        .menu-item:hover .dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .welcome-text {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clock {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 1.5rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .clock-time {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .clock-location {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .welcome-text {
                font-size: 2.5rem;
                padding: 20px;
            }

            .clock {
                font-size: 1.2rem;
                padding: 10px 15px;
                top: 10px;
                right: 10px;
            }

            .clock-time {
                font-size: 1.5rem;
            }

            .menu-bar {
                top: 10px;
                left: 10px;
                flex-wrap: wrap;
                gap: 8px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <nav class="menu-bar" aria-label="Main menu">
        <div class="menu-item">
            <button class="menu-button" type="button">What's up?</button>
            <div class="dropdown" role="menu">
                <a href="#" role="menuitem">Fresh news</a>
                <a href="#" role="menuitem">Latest updates</a>
                <a href="#" role="menuitem">Highlights</a>
            </div>
        </div>
        <div class="menu-item">
            <button class="menu-button" type="button">Dafuq?</button>
            <div class="dropdown" role="menu">
                <a href="#" role="menuitem">Explain it</a>
                <a href="#" role="menuitem">Dig deeper</a>
                <a href="#" role="menuitem">Surprise me</a>
            </div>
        </div>
        <div class="menu-item">
            <button class="menu-button" type="button">Now what?</button>
            <div class="dropdown" role="menu">
                <a href="#" role="menuitem">Next steps</a>
                <a href="#" role="menuitem">Plan ahead</a>
                <a href="#" role="menuitem">Keep moving</a>
            </div>
        </div>
    </nav>
    <div class="welcome-text">
        Welcome Trashers
    </div>

    <div class="clock">
        <div class="clock-time" id="clock-time">00:00:00</div>
        <div class="clock-location">Porto, Portugal</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // Format time for Porto, Portugal (Europe/Lisbon timezone)
            const options = {
                timeZone: 'Europe/Lisbon',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };

            const timeString = now.toLocaleTimeString('en-GB', options);
            document.getElementById('clock-time').textContent = timeString;
        }

        // Update clock immediately
        updateClock();

        // Update clock every second
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
